<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Maintenance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased pb-10">

    <div id="app" class="max-w-2xl mx-auto p-4 md:p-6">
        <header class="text-center mb-8 mt-4">
            <h1 class="text-3xl font-extrabold text-slate-800">Garage<span class="text-blue-600">Log</span></h1>
            <p class="text-sm text-slate-500">Track your car maintenance</p>
        </header>

        <div id="dashboard-view">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-8">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Add a New Car</h2>
                <form id="add-car-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Make</label>
                            <input type="text" id="car-make" placeholder="e.g. Volvo" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Model</label>
                            <input type="text" id="car-model" placeholder="e.g. V60" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Year</label>
                            <input type="number" id="car-year" placeholder="e.g. 2018" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Initial Odometer (km)</label>
                            <input type="number" id="car-odometer" placeholder="e.g. 94500" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">NL Plate</label>
                            <input type="text" id="car-plate" placeholder="e.g. AB-123-C" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none uppercase">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">VIN (Vehicle Identification Number)</label>
                        <input type="text" id="car-vin" placeholder="17-character VIN" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none uppercase">
                    </div>
                    <button type="submit" class="w-full bg-slate-800 text-white p-3 rounded-lg font-bold hover:bg-slate-700 transition">Save Car</button>
                </form>
            </div>

            <div>
                <h2 class="text-lg font-bold mb-4">My Garage</h2>
                <div id="cars-list" class="space-y-4">
                    </div>
            </div>
        </div>

        <div id="car-details-view" class="hidden">
            <button onclick="showDashboard()" class="text-blue-600 font-medium mb-4 flex items-center hover:underline">
                &larr; Back to Garage
            </button>
            
            <div id="active-car-header" class="bg-slate-800 text-white p-5 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-8">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Log New Service</h2>
                <form id="add-log-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Date of Service</label>
                            <input type="date" id="log-date" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Odometer Reading (km)</label>
                            <input type="number" id="log-odometer" required placeholder="e.g. 125000" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="mt-4 border-t pt-4">
                        <label class="block text-sm font-bold mb-2">Parts Changed</label>
                        <div id="parts-container" class="space-y-3">
                            <div class="flex gap-2 part-entry">
                                <input type="text" placeholder="Part Name (e.g. Oil Filter)" required class="w-1/2 border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none part-name">
                                <input type="text" placeholder="Part Nr (e.g. HU719/7X)" class="w-1/2 border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none part-number">
                            </div>
                        </div>
                        <button type="button" onclick="addPartField()" class="text-sm font-semibold text-blue-600 mt-3 inline-block hover:underline">+ Add another part</button>
                    </div>
                    
                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">Save Service Log</button>
                </form>
            </div>

            <div>
                <h3 class="text-lg font-bold mb-4">Service History</h3>
                <div id="logs-list" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
